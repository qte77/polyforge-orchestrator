<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <style>
      /* Light mode (default) */
      .win-frame { fill: #ffffff; }
      .titlebar { fill: #dddddd; }
      .titlebar-text { fill: #333333; }
      .sidebar { fill: #f3f3f3; }
      .border { fill: #e0e0e0; }
      .sidebar-header { fill: #6f6f6f; }
      .repo-text { fill: #333333; }
      .arrow { fill: #b08c35; }
      .tree-dir { fill: #666666; }
      .tree-file { fill: #333333; }
      .tree-ws { fill: #008000; }
      .editor { fill: #ffffff; }
      .tab-text { fill: #333333; }
      .linenum { fill: #999999; }
      .code { fill: #333333; }
      .json-key { fill: #0451a5; }
      .string-val { fill: #a31515; }
      .comment { fill: #008000; }
      .terminal { fill: #f8f8f8; }
      .term-header { fill: #0451a5; }
      .term-text { fill: #333333; }
      .term-ok { fill: #008000; }
      .prompt { fill: #b08c35; }
      .user-label { fill: #a31515; }
      .claude-label { fill: #0451a5; }

      /* Dark mode */
      @media (prefers-color-scheme: dark) {
        .win-frame { fill: #1e1e1e; }
        .titlebar { fill: #323233; }
        .titlebar-text { fill: #cccccc; }
        .sidebar { fill: #252526; }
        .border { fill: #3c3c3c; }
        .sidebar-header { fill: #bbbbbb; }
        .repo-text { fill: #cccccc; }
        .arrow { fill: #e8ab53; }
        .tree-dir { fill: #999999; }
        .tree-file { fill: #cccccc; }
        .tree-ws { fill: #6a9955; }
        .editor { fill: #1e1e1e; }
        .tab-text { fill: #ffffff; }
        .linenum { fill: #6a737d; }
        .code { fill: #d4d4d4; }
        .json-key { fill: #9cdcfe; }
        .string-val { fill: #ce9178; }
        .comment { fill: #6a9955; }
        .terminal { fill: #1e1e1e; }
        .term-header { fill: #569cd6; }
        .term-text { fill: #d4d4d4; }
        .term-ok { fill: #6a9955; }
        .prompt { fill: #e8ab53; }
        .user-label { fill: #d19a66; }
        .claude-label { fill: #569cd6; }
      }
    </style>
  </defs>

  <!-- Window frame -->
  <rect width="960" height="540" rx="8" class="win-frame"/>
  <rect width="960" height="32" rx="8" class="titlebar"/>
  <rect y="28" width="960" height="4" class="titlebar"/>

  <!-- Title bar dots -->
  <circle cx="20" cy="16" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="16" r="6" fill="#febc2e"/>
  <circle cx="60" cy="16" r="6" fill="#28c840"/>
  <text x="480" y="20" text-anchor="middle" class="titlebar-text" font-size="12">polyforge — VS Code</text>

  <!-- Sidebar -->
  <rect x="0" y="32" width="220" height="508" class="sidebar"/>
  <rect x="220" y="32" width="1" height="508" class="border"/>

  <!-- Sidebar header -->
  <text x="12" y="54" class="sidebar-header" font-size="11" font-weight="600" letter-spacing="1">EXPLORER</text>

  <!-- Repo entries -->
  <g font-size="13" class="repo-text">
    <text x="20" y="80" class="arrow">&#x25B6;</text>
    <text x="36" y="80">Agents-eval</text>
    <text x="20" y="102" class="arrow">&#x25B6;</text>
    <text x="36" y="102">cc-research</text>
    <text x="20" y="124" class="arrow">&#x25B6;</text>
    <text x="36" y="124">RAPID-spec-forge</text>
    <text x="20" y="146" class="arrow">&#x25B6;</text>
    <text x="36" y="146">ralph-template</text>
    <text x="20" y="168" class="arrow">&#x25B6;</text>
    <text x="36" y="168">cc-utils-plugin</text>
    <text x="20" y="190" class="arrow">&#x25B6;</text>
    <text x="36" y="190">deepvariant</text>
    <text x="20" y="212" class="arrow">&#x25B6;</text>
    <text x="36" y="212">dotfiles</text>
    <text x="20" y="234" class="arrow">&#x25BC;</text>
    <text x="36" y="234" font-weight="600">polyforge</text>
  </g>

  <!-- Expanded polyforge tree -->
  <g font-size="12" class="tree-dir">
    <text x="60" y="254">.claude/</text>
    <text x="60" y="272">.devcontainer/</text>
    <text x="60" y="290">.vscode/</text>
    <text x="60" y="308">docs/</text>
    <text x="60" y="326">scripts/</text>
    <text x="60" y="344" class="tree-file">CLAUDE.md</text>
    <text x="60" y="362" class="tree-file">Makefile</text>
    <text x="60" y="380" class="tree-file">README.md</text>
    <text x="60" y="398" class="tree-ws">workspace.code-workspace</text>
  </g>

  <!-- Editor area -->
  <rect x="221" y="32" width="739" height="280" class="editor"/>

  <!-- Editor tab -->
  <rect x="221" y="32" width="180" height="28" class="editor"/>
  <rect x="401" y="32" width="1" height="28" class="border"/>
  <text x="234" y="50" class="tab-text" font-size="12">workspace.code-workspace</text>

  <!-- Editor content - workspace file -->
  <g font-size="12" font-family="'Cascadia Code', 'Fira Code', monospace">
    <text x="240" y="82" class="linenum">1</text>
    <text x="270" y="82" class="code">{</text>
    <text x="240" y="100" class="linenum">2</text>
    <text x="270" y="100" class="json-key">&quot;folders&quot;</text><text x="340" y="100" class="code">: [</text>
    <text x="240" y="118" class="linenum">3</text>
    <text x="282" y="118" class="code">{ </text><text x="298" y="118" class="json-key">&quot;path&quot;</text><text x="340" y="118" class="code">: </text><text x="355" y="118" class="string-val">&quot;/workspaces/qte77/Agents-eval&quot;</text><text x="620" y="118" class="code"> },</text>
    <text x="240" y="136" class="linenum">4</text>
    <text x="282" y="136" class="code">{ </text><text x="298" y="136" class="json-key">&quot;path&quot;</text><text x="340" y="136" class="code">: </text><text x="355" y="136" class="string-val">&quot;/workspaces/qte77/ai-agents-research&quot;</text><text x="660" y="136" class="code"> },</text>
    <text x="240" y="154" class="linenum">5</text>
    <text x="282" y="154" class="code">{ </text><text x="298" y="154" class="json-key">&quot;path&quot;</text><text x="340" y="154" class="code">: </text><text x="355" y="154" class="string-val">&quot;/workspaces/qte77/RAPID-spec-forge&quot;</text><text x="650" y="154" class="code"> },</text>
    <text x="240" y="172" class="linenum">6</text>
    <text x="282" y="172" class="comment">// ... 5 more repos</text>
    <text x="240" y="190" class="linenum">7</text>
    <text x="270" y="190" class="code">]</text>
    <text x="240" y="208" class="linenum">8</text>
    <text x="270" y="208" class="code">}</text>
  </g>

  <!-- Terminal area -->
  <rect x="221" y="312" width="739" height="1" class="border"/>
  <rect x="221" y="313" width="739" height="227" class="terminal"/>

  <!-- Terminal splits (side-by-side, group: "repos") — 8 panes -->
  <!-- Split dividers -->
  <rect x="313" y="313" width="1" height="211" class="border"/>
  <rect x="405" y="313" width="1" height="211" class="border"/>
  <rect x="497" y="313" width="1" height="211" class="border"/>
  <rect x="589" y="313" width="1" height="211" class="border"/>
  <rect x="681" y="313" width="1" height="211" class="border"/>
  <rect x="773" y="313" width="1" height="211" class="border"/>
  <rect x="865" y="313" width="1" height="211" class="border"/>

  <!-- Split 1: Agents-eval -->
  <g font-size="8" font-family="'Cascadia Code', 'Fira Code', monospace">
    <text x="226" y="326" class="term-header" font-size="9">Agents-eval</text>
    <text x="226" y="342" class="term-text">$ make validate</text>
    <text x="226" y="356" class="term-ok">&#x2714; markdownlint</text>
    <text x="226" y="370" class="term-ok">&#x2714; jscpd</text>
    <text x="226" y="384" class="term-ok">&#x2714; lychee</text>
    <text x="226" y="406" class="term-header">$ _</text>
  </g>

  <!-- Split 2: cc-research (claude session) -->
  <g font-size="8" font-family="'Cascadia Code', 'Fira Code', monospace">
    <text x="318" y="326" class="term-header" font-size="9">cc-research</text>
    <text x="318" y="342" class="prompt">&#x276F; claude</text>
    <text x="318" y="356" class="user-label">You:</text><text x="342" y="356" class="term-text"> summarize</text>
    <text x="318" y="370" class="term-text">recent changes</text>
    <text x="318" y="388" class="claude-label">Claude:</text>
    <text x="318" y="402" class="term-text">3 commits on</text>
    <text x="318" y="416" class="term-text">main since..</text>
    <text x="318" y="436" class="prompt">&#x276F; _</text>
  </g>

  <!-- Split 3: RAPID-spec-forge -->
  <g font-size="8" font-family="'Cascadia Code', 'Fira Code', monospace">
    <text x="410" y="326" class="term-header" font-size="9">RAPID</text>
    <text x="410" y="342" class="term-text">$ make validate</text>
    <text x="410" y="356" class="term-ok">&#x2714; ruff</text>
    <text x="410" y="370" class="term-ok">&#x2714; pytest</text>
    <text x="410" y="406" class="term-header">$ _</text>
  </g>

  <!-- Split 4: ralph-template -->
  <g font-size="8" font-family="'Cascadia Code', 'Fira Code', monospace">
    <text x="502" y="326" class="term-header" font-size="9">ralph</text>
    <text x="502" y="342" class="term-text">$ git log -1</text>
    <text x="502" y="356" class="term-text">feat: add</text>
    <text x="502" y="370" class="term-text">kanban loop</text>
    <text x="502" y="406" class="term-header">$ _</text>
  </g>

  <!-- Split 5: cc-utils-plugin (claude session) -->
  <g font-size="8" font-family="'Cascadia Code', 'Fira Code', monospace">
    <text x="594" y="326" class="term-header" font-size="9">cc-utils</text>
    <text x="594" y="342" class="prompt">&#x276F; claude</text>
    <text x="594" y="356" class="user-label">You:</text><text x="618" y="356" class="term-text"> add tests</text>
    <text x="594" y="370" class="term-text">for commit-</text>
    <text x="594" y="384" class="term-text">helper plugin</text>
    <text x="594" y="402" class="claude-label">Claude:</text>
    <text x="594" y="416" class="term-ok">&#x2714; 4 tests</text>
    <text x="594" y="436" class="prompt">&#x276F; _</text>
  </g>

  <!-- Split 6: deepvariant -->
  <g font-size="8" font-family="'Cascadia Code', 'Fira Code', monospace">
    <text x="686" y="326" class="term-header" font-size="9">deepvariant</text>
    <text x="686" y="342" class="term-text">$ git status</text>
    <text x="686" y="356" class="term-text">On branch main</text>
    <text x="686" y="370" class="term-text">clean</text>
    <text x="686" y="406" class="term-header">$ _</text>
  </g>

  <!-- Split 7: polyforge -->
  <g font-size="8" font-family="'Cascadia Code', 'Fira Code', monospace">
    <text x="778" y="326" class="term-header" font-size="9">polyforge</text>
    <text x="778" y="342" class="term-text">$ make help</text>
    <text x="778" y="356" class="term-text">clone_repos</text>
    <text x="778" y="370" class="term-text">setup_all</text>
    <text x="778" y="384" class="term-text">generate</text>
    <text x="778" y="406" class="term-header">$ _</text>
  </g>

  <!-- Split 8: dotfiles -->
  <g font-size="8" font-family="'Cascadia Code', 'Fira Code', monospace">
    <text x="870" y="326" class="term-header" font-size="9">dotfiles</text>
    <text x="870" y="342" class="term-text">$ ls</text>
    <text x="870" y="356" class="term-text">.claude/</text>
    <text x="870" y="370" class="term-text">.config/</text>
    <text x="870" y="384" class="term-text">install.sh</text>
    <text x="870" y="406" class="term-header">$ _</text>
  </g>

  <!-- Status bar -->
  <rect x="0" y="524" width="960" height="16" fill="#007acc"/>
  <text x="12" y="535" fill="#ffffff" font-size="11">refactor/cleanup-yagni-kiss-dry</text>
  <text x="280" y="535" fill="#ffffff" font-size="11">8 repos</text>
  <text x="880" y="535" fill="#ffffff" font-size="11">UTF-8</text>
</svg>
