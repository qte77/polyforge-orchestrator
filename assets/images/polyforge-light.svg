<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="'Segoe UI', system-ui, sans-serif">
  <!-- Window frame -->
  <rect width="960" height="540" rx="8" fill="#ffffff"/>
  <rect width="960" height="32" rx="8" fill="#dddddd"/>
  <rect y="28" width="960" height="4" fill="#dddddd"/>

  <!-- Title bar dots -->
  <circle cx="20" cy="16" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="16" r="6" fill="#febc2e"/>
  <circle cx="60" cy="16" r="6" fill="#28c840"/>
  <text x="480" y="20" text-anchor="middle" fill="#333333" font-size="12">polyforge — VS Code</text>

  <!-- Sidebar -->
  <rect x="0" y="32" width="220" height="508" fill="#f3f3f3"/>
  <rect x="220" y="32" width="1" height="508" fill="#e0e0e0"/>

  <!-- Sidebar header -->
  <text x="12" y="54" fill="#6f6f6f" font-size="11" font-weight="600" letter-spacing="1">EXPLORER</text>

  <!-- Repo entries -->
  <g font-size="13" fill="#333333">
    <text x="20" y="80" fill="#b08c35">&#x25B6;</text>
    <text x="36" y="80">Agents-eval</text>
    <text x="20" y="102" fill="#b08c35">&#x25B6;</text>
    <text x="36" y="102">cc-research</text>
    <text x="20" y="124" fill="#b08c35">&#x25B6;</text>
    <text x="36" y="124">RAPID-spec-forge</text>
    <text x="20" y="146" fill="#b08c35">&#x25B6;</text>
    <text x="36" y="146">ralph-template</text>
    <text x="20" y="168" fill="#b08c35">&#x25B6;</text>
    <text x="36" y="168">cc-utils-plugin</text>
    <text x="20" y="190" fill="#b08c35">&#x25B6;</text>
    <text x="36" y="190">deepvariant</text>
    <text x="20" y="212" fill="#b08c35">&#x25B6;</text>
    <text x="36" y="212">dotfiles</text>
    <text x="20" y="234" fill="#b08c35">&#x25BC;</text>
    <text x="36" y="234" font-weight="600">polyforge</text>
  </g>

  <!-- Expanded polyforge tree -->
  <g font-size="12" fill="#666666">
    <text x="60" y="254">.claude/</text>
    <text x="60" y="272">.devcontainer/</text>
    <text x="60" y="290">.vscode/</text>
    <text x="60" y="308">docs/</text>
    <text x="60" y="326">scripts/</text>
    <text x="60" y="344" fill="#333333">CLAUDE.md</text>
    <text x="60" y="362" fill="#333333">Makefile</text>
    <text x="60" y="380" fill="#333333">README.md</text>
    <text x="60" y="398" fill="#008000">workspace.code-workspace</text>
  </g>

  <!-- Editor area -->
  <rect x="221" y="32" width="739" height="280" fill="#ffffff"/>

  <!-- Editor tab -->
  <rect x="221" y="32" width="180" height="28" fill="#ffffff"/>
  <rect x="401" y="32" width="1" height="28" fill="#e0e0e0"/>
  <text x="234" y="50" fill="#333333" font-size="12">workspace.code-workspace</text>

  <!-- Editor content -->
  <g font-size="12" font-family="'Cascadia Code', 'Fira Code', monospace">
    <text x="240" y="82" fill="#999999">1</text>
    <text x="270" y="82" fill="#333333">{</text>
    <text x="240" y="100" fill="#999999">2</text>
    <text x="270" y="100" fill="#0451a5">&quot;folders&quot;</text><text x="340" y="100" fill="#333333">: [</text>
    <text x="240" y="118" fill="#999999">3</text>
    <text x="282" y="118" fill="#333333">{ </text><text x="298" y="118" fill="#0451a5">&quot;path&quot;</text><text x="340" y="118" fill="#333333">: </text><text x="355" y="118" fill="#a31515">&quot;/workspaces/qte77/Agents-eval&quot;</text><text x="620" y="118" fill="#333333"> },</text>
    <text x="240" y="136" fill="#999999">4</text>
    <text x="282" y="136" fill="#333333">{ </text><text x="298" y="136" fill="#0451a5">&quot;path&quot;</text><text x="340" y="136" fill="#333333">: </text><text x="355" y="136" fill="#a31515">&quot;/workspaces/qte77/ai-agents-research&quot;</text><text x="660" y="136" fill="#333333"> },</text>
    <text x="240" y="154" fill="#999999">5</text>
    <text x="282" y="154" fill="#333333">{ </text><text x="298" y="154" fill="#0451a5">&quot;path&quot;</text><text x="340" y="154" fill="#333333">: </text><text x="355" y="154" fill="#a31515">&quot;/workspaces/qte77/RAPID-spec-forge&quot;</text><text x="650" y="154" fill="#333333"> },</text>
    <text x="240" y="172" fill="#999999">6</text>
    <text x="282" y="172" fill="#008000">// ... 5 more repos</text>
    <text x="240" y="190" fill="#999999">7</text>
    <text x="270" y="190" fill="#333333">]</text>
    <text x="240" y="208" fill="#999999">8</text>
    <text x="270" y="208" fill="#333333">}</text>
  </g>

  <!-- Terminal area -->
  <rect x="221" y="312" width="739" height="1" fill="#e0e0e0"/>
  <rect x="221" y="313" width="739" height="227" fill="#f8f8f8"/>

  <!-- Terminal splits (side-by-side, group: "repos") — 8 panes -->
  <!-- Split dividers -->
  <rect x="313" y="313" width="1" height="211" fill="#e0e0e0"/>
  <rect x="405" y="313" width="1" height="211" fill="#e0e0e0"/>
  <rect x="497" y="313" width="1" height="211" fill="#e0e0e0"/>
  <rect x="589" y="313" width="1" height="211" fill="#e0e0e0"/>
  <rect x="681" y="313" width="1" height="211" fill="#e0e0e0"/>
  <rect x="773" y="313" width="1" height="211" fill="#e0e0e0"/>
  <rect x="865" y="313" width="1" height="211" fill="#e0e0e0"/>

  <!-- Split 1: Agents-eval -->
  <g font-size="8" font-family="'Cascadia Code', 'Fira Code', monospace">
    <text x="226" y="326" fill="#0451a5" font-size="9">Agents-eval</text>
    <text x="226" y="342" fill="#333333">$ make validate</text>
    <text x="226" y="356" fill="#008000">&#x2714; markdownlint</text>
    <text x="226" y="370" fill="#008000">&#x2714; jscpd</text>
    <text x="226" y="384" fill="#008000">&#x2714; lychee</text>
    <text x="226" y="406" fill="#0451a5">$ _</text>
  </g>

  <!-- Split 2: cc-research (claude session) -->
  <g font-size="8" font-family="'Cascadia Code', 'Fira Code', monospace">
    <text x="318" y="326" fill="#0451a5" font-size="9">cc-research</text>
    <text x="318" y="342" fill="#b08c35">&#x276F; claude</text>
    <text x="318" y="356" fill="#a31515">You:</text><text x="342" y="356" fill="#333333"> summarize</text>
    <text x="318" y="370" fill="#333333">recent changes</text>
    <text x="318" y="388" fill="#0451a5">Claude:</text>
    <text x="318" y="402" fill="#333333">3 commits on</text>
    <text x="318" y="416" fill="#333333">main since..</text>
    <text x="318" y="436" fill="#b08c35">&#x276F; _</text>
  </g>

  <!-- Split 3: RAPID-spec-forge -->
  <g font-size="8" font-family="'Cascadia Code', 'Fira Code', monospace">
    <text x="410" y="326" fill="#0451a5" font-size="9">RAPID</text>
    <text x="410" y="342" fill="#333333">$ make validate</text>
    <text x="410" y="356" fill="#008000">&#x2714; ruff</text>
    <text x="410" y="370" fill="#008000">&#x2714; pytest</text>
    <text x="410" y="406" fill="#0451a5">$ _</text>
  </g>

  <!-- Split 4: ralph-template -->
  <g font-size="8" font-family="'Cascadia Code', 'Fira Code', monospace">
    <text x="502" y="326" fill="#0451a5" font-size="9">ralph</text>
    <text x="502" y="342" fill="#333333">$ git log -1</text>
    <text x="502" y="356" fill="#333333">feat: add</text>
    <text x="502" y="370" fill="#333333">kanban loop</text>
    <text x="502" y="406" fill="#0451a5">$ _</text>
  </g>

  <!-- Split 5: cc-utils-plugin (claude session) -->
  <g font-size="8" font-family="'Cascadia Code', 'Fira Code', monospace">
    <text x="594" y="326" fill="#0451a5" font-size="9">cc-utils</text>
    <text x="594" y="342" fill="#b08c35">&#x276F; claude</text>
    <text x="594" y="356" fill="#a31515">You:</text><text x="618" y="356" fill="#333333"> add tests</text>
    <text x="594" y="370" fill="#333333">for commit-</text>
    <text x="594" y="384" fill="#333333">helper plugin</text>
    <text x="594" y="402" fill="#0451a5">Claude:</text>
    <text x="594" y="416" fill="#008000">&#x2714; 4 tests</text>
    <text x="594" y="436" fill="#b08c35">&#x276F; _</text>
  </g>

  <!-- Split 6: deepvariant -->
  <g font-size="8" font-family="'Cascadia Code', 'Fira Code', monospace">
    <text x="686" y="326" fill="#0451a5" font-size="9">deepvariant</text>
    <text x="686" y="342" fill="#333333">$ git status</text>
    <text x="686" y="356" fill="#333333">On branch main</text>
    <text x="686" y="370" fill="#333333">clean</text>
    <text x="686" y="406" fill="#0451a5">$ _</text>
  </g>

  <!-- Split 7: polyforge -->
  <g font-size="8" font-family="'Cascadia Code', 'Fira Code', monospace">
    <text x="778" y="326" fill="#0451a5" font-size="9">polyforge</text>
    <text x="778" y="342" fill="#333333">$ make help</text>
    <text x="778" y="356" fill="#333333">clone_repos</text>
    <text x="778" y="370" fill="#333333">setup_all</text>
    <text x="778" y="384" fill="#333333">generate</text>
    <text x="778" y="406" fill="#0451a5">$ _</text>
  </g>

  <!-- Split 8: dotfiles -->
  <g font-size="8" font-family="'Cascadia Code', 'Fira Code', monospace">
    <text x="870" y="326" fill="#0451a5" font-size="9">dotfiles</text>
    <text x="870" y="342" fill="#333333">$ ls</text>
    <text x="870" y="356" fill="#333333">.claude/</text>
    <text x="870" y="370" fill="#333333">.config/</text>
    <text x="870" y="384" fill="#333333">install.sh</text>
    <text x="870" y="406" fill="#0451a5">$ _</text>
  </g>

  <!-- Status bar -->
  <rect x="0" y="524" width="960" height="16" fill="#007acc"/>
  <text x="12" y="535" fill="#ffffff" font-size="11">refactor/cleanup-yagni-kiss-dry</text>
  <text x="280" y="535" fill="#ffffff" font-size="11">8 repos</text>
  <text x="880" y="535" fill="#ffffff" font-size="11">UTF-8</text>
</svg>
